services:
  postgres:
    image: postgres:17.2-alpine
    container_name: contab-hub-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5437:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contab-hub-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: http://minio:9003
      MINIO_BUCKET: ${MINIO_BUCKET:-contab-hub-bucket}
    ports:
      - '3002:3002'
    depends_on:
      - postgres
      - minio

  minio:
    image: minio/minio:latest
    container_name: contab-hub-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9003:9003'
      - '9001:9001'
    volumes:
      - minio-data:/data
    command: server /data --address ":9003" --console-address ":9001"

volumes:
  pgdata:
  minio-data:
